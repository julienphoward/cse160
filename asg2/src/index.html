<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Blocky Koala</title>
</head>
<body onload="main()">
<canvas id="webgl" width="400" height="400">
  Please use a browser that supports "canvas"
</canvas>
<br>
<p>FPS: <span id="fpsCounter">0</span></p>
<label>Global Rotation: <input type="range" id="globalRotSlider" min="-180" max="180" value="0"></label><br>
<br>
<b>Front Left Leg</b><br>
<label>Upper: <input type="range" id="frontLeftUpperLegSlider" min="-90" max="90" value="0"></label><br>
<label>Lower: <input type="range" id="frontLeftLowerLegSlider" min="-90" max="90" value="0"></label><br>
<label>Paw: <input type="range" id="frontLeftPawSlider" min="-45" max="45" value="0"></label><br>
<br>
<b>Front Right Leg</b><br>
<label>Upper: <input type="range" id="frontRightUpperLegSlider" min="-90" max="90" value="0"></label><br>
<label>Lower: <input type="range" id="frontRightLowerLegSlider" min="-90" max="90" value="0"></label><br>
<label>Paw: <input type="range" id="frontRightPawSlider" min="-45" max="45" value="0"></label><br>
<br>
<b>Back Left Leg</b><br>
<label>Upper: <input type="range" id="backLeftUpperLegSlider" min="-90" max="90" value="0"></label><br>
<label>Lower: <input type="range" id="backLeftLowerLegSlider" min="-90" max="90" value="0"></label><br>
<label>Paw: <input type="range" id="backLeftPawSlider" min="-45" max="45" value="0"></label><br>
<br>
<b>Back Right Leg</b><br>
<label>Upper: <input type="range" id="backRightUpperLegSlider" min="-90" max="90" value="0"></label><br>
<label>Lower: <input type="range" id="backRightLowerLegSlider" min="-90" max="90" value="0"></label><br>
<label>Paw: <input type="range" id="backRightPawSlider" min="-45" max="45" value="0"></label><br>
<br>
<button id="animBtn">Start Animation</button>
<button id="resetBtn">Reset All</button>
<br>
<br>
<p>Julien Howard | jphoward@ucsc.edu</p>
<script src="../lib/cuon-matrix.js"></script>
<script src="../lib/webgl-utils.js"></script>
<script src="../lib/webgl-debug.js"></script>
<script src="../lib/cuon-utils.js"></script>
<script src="asg2.js"></script>
</body>
</html>
